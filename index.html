<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/logo.ico" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <!-- Primary SEO -->
    <title>VIT STELLAR</title>
    <meta
      name="description"
      content="VIT Stellar is the official Astronomy Club of Vellore Institute of Technology. Explore the cosmos through star parties, workshops, Gravitas events, and a community of 1000+ space enthusiasts."
    />
    <meta name="theme-color" content="#0a0a0e" />

    <!-- Open Graph (Facebook, WhatsApp, LinkedIn) -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="VIT Stellar — Astronomy Club, VIT Vellore" />
    <meta
      property="og:description"
      content="VIT Stellar is the official Astronomy Club of Vellore Institute of Technology. Explore the cosmos through star parties, workshops, Gravitas events, and a community of 1000+ space enthusiasts."
    />
    <meta property="og:image" content="/assets/hero/Center.webp" />
    <meta property="og:site_name" content="VIT Stellar" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="VIT Stellar — Astronomy Club, VIT Vellore" />
    <meta
      name="twitter:description"
      content="VIT Stellar is the official Astronomy Club of Vellore Institute of Technology. Explore the cosmos through star parties, workshops, Gravitas events, and a community of 1000+ space enthusiasts."
    />
    <meta name="twitter:image" content="/assets/hero/Center.webp" />

    <!-- Google Fonts — loaded as <link> so the browser can preconnect and
         prioritise font fetching instead of blocking on CSS @import parsing -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&family=Gruppo&display=swap"
    />
    <!-- Material Icons Round (used by Icon.jsx and several components) -->
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/icon?family=Material+Icons+Round"
    />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
